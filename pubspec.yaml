name: all_validations_br
description: "Dart/Flutter library for Brazilian validations (CPF, CNPJ, CNH, PIX), 23 input formatters/masks, utilities (JWT, UUID, currency) and ChaCha20-Poly1305 encryption."
version: 4.2.0
homepage: https://github.com/CriandoGames/all_validations_br
repository: https://github.com/CriandoGames/all_validations_br
issue_tracker: https://github.com/CriandoGames/all_validations_br/issues

topics:
  - validation
  - brazil
  - formatter
  - mask
  - cpf


environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0




